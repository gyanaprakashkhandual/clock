<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="notification-area" id="notificationArea"></div>

    <header>
      <div class="header-inner">
        <div class="logo">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          Clock
        </div>
        <nav class="tab-nav">
          <button class="tab-btn active" data-tab="clock">Clock</button>
          <button class="tab-btn" data-tab="stopwatch">Stopwatch</button>
          <button class="tab-btn" data-tab="timer">Timer</button>
        </nav>
      </div>
    </header>

    <main>
      <div id="clockTab" class="tab-content active">
        <div class="card clock-card">
          <div class="digital-clock" id="digitalClock">00:00:00</div>
          <div class="date-display" id="dateDisplay">
            Monday, January 1, 2024
          </div>
        </div>
      </div>

      <div id="stopwatchTab" class="tab-content">
        <div class="card">
          <div class="stopwatch-display" id="stopwatchDisplay">00:00.00</div>
          <div class="btn-row">
            <button class="btn btn-primary" id="startStopBtn">Start</button>
            <button class="btn btn-outline" id="lapResetBtn">Lap</button>
            <button class="btn btn-ghost" id="clearLapsBtn">Clear</button>
          </div>
          <div class="laps-container" id="lapsContainer"></div>
        </div>
      </div>

      <div id="timerTab" class="tab-content">
        <div class="card">
          <div class="ring-wrap">
            <svg class="progress-ring" viewBox="0 0 200 200">
              <circle class="ring-bg" cx="100" cy="100" r="88" />
              <circle
                class="ring-fg"
                cx="100"
                cy="100"
                r="88"
                id="progressCircle"
              />
            </svg>
            <div class="timer-display" id="timerDisplay">25:00</div>
          </div>
          <div class="timer-inputs">
            <input
              type="number"
              class="timer-input"
              id="minutesInput"
              min="0"
              max="99"
              value="25"
            />
            <span class="colon">:</span>
            <input
              type="number"
              class="timer-input"
              id="secondsInput"
              min="0"
              max="59"
              value="0"
            />
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="startTimerBtn">Start</button>
            <button class="btn btn-outline" id="pauseTimerBtn">Pause</button>
            <button class="btn btn-ghost" id="resetTimerBtn">Reset</button>
          </div>
          <div class="preset-row">
            <button class="preset-btn" id="pomodoro25">25 min</button>
            <button class="preset-btn" id="pomodoro15">15 min</button>
            <button class="preset-btn" id="pomodoro5">5 min</button>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
